name: phonescope

services:
  mysql:
    image: mysql:8.0
    container_name: phonescope-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: phonescope
      MYSQL_USER: phonescope
      MYSQL_PASSWORD: phonescope
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
